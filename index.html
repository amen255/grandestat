<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سیستەمی خانووبەرە | نظام العقارات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;700&family=Noto+Naskh+Arabic:wght@400;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=3">
</head>
<body>
  <!-- Loading overlay while the database loads -->
  <div id="boot-overlay">
    <div class="spinner"></div>
    <div style="color:#6b7a90;font-size:15px">…</div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="logo">🏘️</span><span id="brand-title">سیستەمی خانووبەرە</span></div>
      <div id="nav"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1 id="page-title">داشبۆرد</h1>
        <div class="topbar-actions">
          <button class="btn btn-light btn-sm" id="btn-backup" title="Backup">💾</button>
          <button class="btn btn-light btn-sm" id="btn-settings" title="Settings">⚙️</button>
          <button class="btn btn-light btn-sm" id="btn-account" title="Account">🔒</button>
          <button class="btn btn-light btn-sm" id="btn-logout" title="Logout">🚪</button>
          <div class="lang-switch">
            <button data-lang="ku" class="active">کوردی</button>
            <button data-lang="ar">عربي</button>
          </div>
        </div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div id="print-area"></div>

  <script src="js/i18n.js?v=3"></script>
  <script src="js/contract_text.js?v=3"></script>
  <script src="js/db.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
